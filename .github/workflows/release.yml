name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/slack-mirror
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Litestream image metadata
        id: meta-litestream
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/slack-mirror
          tags: |
            type=semver,pattern={{version}},suffix=-litestream
            type=ref,event=tag,suffix=-litestream
      - name: Build & push litestream image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.litestream
          push: true
          tags: ${{ steps.meta-litestream.outputs.tags }}
          labels: ${{ steps.meta-litestream.outputs.labels }}
